<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Clever | Portal</title>

    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/wZKh3RtG/favicon.jpg">

    <style type="text/css">
        /* 1. RESET & THEME */
        body, html {
            margin: 0 !important;
            padding: 0 !important;
            width: 100%;
            height: 100%;
            overflow: hidden !important;
            background-color: #000000 !important;
            font-family: Arial, sans-serif;
        }

        /* 2. THE TOP BAR - FORCED PURE WHITE */
        #topbar {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 60px !important;
            background-color: #ffffff !important; 
            background: #ffffff !important;
            display: flex !important;
            align-items: center !important;
            padding: 0 15px !important;
            z-index: 1000000 !important;
            box-sizing: border-box !important;
            border: none !important;
        }

        #topbar img {
            height: 40px !important;
            margin-right: 12px !important;
        }

        #topbar a {
            color: #000000 !important;
            text-decoration: none !important;
            font-size: 20px !important;
            font-weight: 500 !important;
        }

        /* 3. GAME AREA SETUP */
        #game-container {
            position: absolute !important;
            top: 60px !important; /* Below the white bar */
            left: 0 !important;
            width: 100% !important;
            height: calc(100% - 60px) !important;
            background: #000 !important;
        }

        #game-area {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block !important;
        }
    </style>
</head>
<body>

    <div id="topbar">
        <img src="https://lh3.googleusercontent.com/a-/ALV-UjWQneu0wwz9oqOIrJuC-rEk16wbmHPB_n6DEY2AUPRoiQYTQZs=s240-p-k-rw-no" alt="Logo">
        <a href="https://sites.google.com/view/bobsgwebsite/home">Clever | Portal</a>
    </div>

    <div id="game-container">
        <iframe 
            id="game-area" 
            src="https://ev.io" 
            scrolling="no" 
            frameborder="0" 
            allow="autoplay; fullscreen; pointer-lock; accelerometer; gyroscope"
            allowfullscreen>
        </iframe>
    </div>

    <script type="text/javascript">
        // 4. 360-SPIN / FOCUS FIX
        // Ensures the game captures the mouse immediately upon clicking
        window.addEventListener('mousedown', function() {
            document.getElementById('game-area').focus();
        });
    </script>
</body>
</html>
